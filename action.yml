name: Update Backstage Techdocs
description: Updates Backstage Techdocs on Elisa premises
inputs:
  entity:
    description: Backstage entity for documents, e.g. "default/Component/myEntity"
    required: true
  source-dir:
     description: Source directory containing mkdocs.yml and docs subdirectory, e.g. "."
     required: false
     default: .
  output-dir:
     description: Output directory containing generated TechDocs site, e.g. "./site/"
     required: false
     default: ./site/
  storage-type:
    description: Storage type for published documents, e.g. "awsS3"
    required: false
    default: awsS3
  s3-access-key-id:
    description: S3 access key id
    required: false
  s3-secret-access-key:
    description: S3 secret access key
    required: false
  s3-bucket:
    description: Storage bucket
    required: false
  s3-region:
    description: S3 region
    required: false
    default: eu-central-1
  # GCP WIF Inputs
  gcp-project-id:
    description: GCP Project ID
    required: false
  gcp-workload-identity-provider:
    description: GCP Workload Identity Provider
    required: false
  gcp-service-account:
    description: GCP Service Account to impersonate
    required: false
  gcp-bucket:
    description: GCP Storage bucket
    required: false
runs:
  using: composite
  steps:
    - name: Validate Inputs
      run: |
        STORAGE_TYPE="${{ inputs.storage-type }}"

        if [[ "$STORAGE_TYPE" == "awsS3" ]]; then
          if [[ -z "${{ inputs.s3-access-key-id }}" ]]; then echo "::error::s3-access-key-id is required for awsS3 storage"; exit 1; fi
          if [[ -z "${{ inputs.s3-secret-access-key }}" ]]; then echo "::error::s3-secret-access-key is required for awsS3 storage"; exit 1; fi
          if [[ -z "${{ inputs.s3-bucket }}" ]]; then echo "::error::s3-bucket is required for awsS3 storage"; exit 1; fi
        elif [[ "$STORAGE_TYPE" == "googleGcs" ]]; then
          if [[ -z "${{ inputs.gcp-project-id }}" ]]; then echo "::error::gcp-project-id is required for googleGcs storage"; exit 1; fi
          if [[ -z "${{ inputs.gcp-workload-identity-provider }}" ]]; then echo "::error::gcp-workload-identity-provider is required for googleGcs storage"; exit 1; fi
          if [[ -z "${{ inputs.gcp-service-account }}" ]]; then echo "::error::gcp-service-account is required for googleGcs storage"; exit 1; fi
          if [[ -z "${{ inputs.gcp-bucket }}" ]]; then echo "::error::gcp-bucket is required for googleGcs storage"; exit 1; fi
        else
          echo "::error::Invalid storage-type: $STORAGE_TYPE. Must be 'awsS3' or 'googleGcs'."
          exit 1
        fi
      shell: bash

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
    - name: Generate documents
      run: |
        npx @techdocs/cli generate \
            --source-dir "${{ inputs.source-dir }}" \
            --output-dir "${{ inputs.output-dir }}"
      shell: bash

    - if: ${{ inputs.storage-type == 'awsS3' }}
      name: Publish documents
      env:
        AWS_REGION: ${{ inputs.s3-region }}
        AWS_ACCESS_KEY_ID: ${{ inputs.s3-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.s3-secret-access-key }}
      run: |
         npx @techdocs/cli publish \
           --entity "${{ inputs.entity }}" \
           --directory "${{ inputs.output-dir }}" \
           --storage-name "${{ inputs.s3-bucket }}" \
           --publisher-type awsS3
      shell: bash

    - if: ${{ inputs.storage-type == 'googleGcs' }}
      name: Authenticate with GCP
      uses: google-github-actions/auth@v2
      with:
        project_id: ${{ inputs.gcp-project-id }}
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
        service_account: ${{ inputs.gcp-service-account }}

    - if: ${{ inputs.storage-type == 'googleGcs' }}
      name: Publish documents
      run: |
         npx @techdocs/cli publish \
           --entity "${{ inputs.entity }}" \
           --directory "${{ inputs.output-dir }}" \
           --storage-name "${{ inputs.gcp-bucket }}" \
           --publisher-type googleGcs
      shell: bash
branding:
  color: blue
  icon: filter
